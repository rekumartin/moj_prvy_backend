<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Neon Student Lounge</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --neon-pink: #ff00cc;
  --neon-cyan: #00ffff;
  --neon-purple: #9b00ff;
  --bg-dark: #08060f;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.12);
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: white;
  min-height: 100vh;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--neon-cyan);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

button {
  padding: 10px 15px;
  cursor: pointer;
  border: none;
  margin: 5px;
}

input {
  padding: 10px;
}

</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px;">STUDENT LOUNGE</h1>

<div style="text-align:center;margin:20px;">
  <input id="apiUrl" 
         value="https://rekumartin.github.io/moj_prvy_backend/api.json"
         style="width:300px;">
  <button onclick="loadAll()">Načítaj</button>
</div>

<div style="text-align:center;">
  <input id="search" placeholder="Hľadaj...">
  <button onclick="filterStudents()">Hľadaj</button>
</div>

<div class="grid" id="grid"></div>

<script>
function getAPI() {
  return document.getElementById('apiUrl').value 
    || 'https://rekumartin.github.io/moj_prvy_backend/api.json';
}

let allStudents = [];

async function loadAll() {
  document.getElementById('grid').innerHTML = "Načítavam...";

  try {
    const res = await fetch(getAPI());
    if (!res.ok) throw new Error();

    allStudents = await res.json();
    renderStudents(allStudents);

  } catch {
    document.getElementById('grid').innerHTML = "Chyba API";
  }
}

function filterStudents() {
  const q = document.getElementById('search').value.toLowerCase();

  const filtered = allStudents.filter(s =>
    (s.meno || '').toLowerCase().includes(q) ||
    (s.prezyvka || '').toLowerCase().includes(q)
  );

  renderStudents(filtered);
}

function renderStudents(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!data.length) {
    grid.innerHTML = "Nič nenájdené";
    return;
  }

  data.forEach(s => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${s.fotka || `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${s.id}`}">
      <div class="card-body">
        <b>${s.meno || '-'}</b><br>
        @${s.prezyvka || '-'}<br>
        ${s.funfact || ''}
      </div>
    `;

    grid.appendChild(div);
  });
}

// auto load
loadAll();
</script>

</body>
</html>
