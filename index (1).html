<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Neon Student Lounge</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-pink: #ff00cc;
    --neon-cyan: #00ffff;
    --neon-purple: #9b00ff;
    --bg-dark: #08060f;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.12);
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orbs */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(155,0,255,0.12) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite alternate;
  }

  @keyframes orbFloat {
    from { transform: translate(0, 0); }
    to   { transform: translate(-40px, 40px); }
  }

  .orb2 {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,255,0.08) 0%, transparent 70%);
    bottom: -150px;
    left: -150px;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 10s ease-in-out infinite alternate-reverse;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 50px 20px 30px;
    text-align: center;
  }

  .logo-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  @keyframes shimmer {
    0%   { background-position: 0% }
    100% { background-position: 200% }
  }

  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* Search bar */
  .search-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 10px 20px 40px;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
  }

  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--neon-cyan);
    font-size: 18px;
    pointer-events: none;
  }

  input[type="text"] {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 11px 16px 11px 40px;
    width: 280px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input[type="text"]:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
  }

  input::placeholder { color: rgba(255,255,255,0.25); }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
    color: white;
    box-shadow: 0 0 15px rgba(255,0,204,0.4);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(255,0,204,0.7);
  }

  .btn-secondary {
    background: transparent;
    color: var(--neon-cyan);
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
  }

  .btn-secondary:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
    transform: translateY(-2px);
  }

  /* Stats bar */
  .stats-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 30px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
  }

  .stats-bar span { color: var(--neon-cyan); }

  /* Grid */
  .grid {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px;
    padding: 0 30px 60px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s, border-color 0.35s;
    animation: fadeIn 0.5s ease both;
    backdrop-filter: blur(10px);
  }

  .card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow: 0 0 30px rgba(0,255,255,0.25), 0 20px 40px rgba(0,0,0,0.5);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img-wrap {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .card:hover .card-img-wrap img {
    transform: scale(1.08);
  }

  .card-id {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 6px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    padding: 3px 8px;
  }

  .card-body {
    padding: 14px 16px 18px;
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-nick {
    font-size: 13px;
    color: var(--neon-pink);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .card-nick::before { content: '@ '; opacity: 0.5; }

  .card-funfact {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
    animation: modalFadeIn 0.25s ease;
  }

  @keyframes modalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal-box {
    background: #0e0b1a;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 24px;
    width: 90%;
    max-width: 480px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,255,255,0.15), 0 0 120px rgba(155,0,255,0.1);
    animation: modalSlideUp 0.3s cubic-bezier(.22,.68,0,1.2);
  }

  @keyframes modalSlideUp {
    from { transform: translateY(30px) scale(0.97); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .modal-img-wrap {
    position: relative;
    width: 100%;
    height: 260px;
  }

  .modal-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .modal-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(transparent, #0e0b1a);
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.2s, border-color 0.2s;
  }

  .modal-close:hover {
    background: rgba(255,0,204,0.3);
    border-color: var(--neon-pink);
  }

  .modal-body {
    padding: 20px 28px 30px;
  }

  .modal-id {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--neon-cyan);
    opacity: 0.6;
    margin-bottom: 6px;
  }

  .modal-name {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .modal-nick {
    font-size: 16px;
    color: var(--neon-pink);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .modal-nick::before { content: '@ '; opacity: 0.4; }

  .modal-section-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .modal-funfact {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    border-left: 2px solid var(--neon-purple);
    padding-left: 14px;
  }

  /* States */
  .state {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 80px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
  }

  .state .icon { font-size: 48px; margin-bottom: 16px; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(0,255,255,0.1);
    border-top-color: var(--neon-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 3px; }
</style>
</head>
<body>

<div class="orb2"></div>

<header>
  <div class="logo-label">System / 2024</div>
  <h1>STUDENT LOUNGE</h1>
  <p class="subtitle">Neon Class Directory</p>
</header>

<div class="search-wrap" style="flex-direction:column; gap:14px;">
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;">
    <div class="search-box" style="position:relative;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--neon-purple);font-size:13px;pointer-events:none;">🔌</span>
      <input type="text" id="apiUrl" placeholder="napr. http://localhost:5000" 
        style="padding-left:36px; width:280px; font-family:'Rajdhani',sans-serif; background:rgba(155,0,255,0.08); border-color:rgba(155,0,255,0.3);"
        value="https://rekumartin.github.io/moj_prvy_backend">
    </div>
    <button class="btn btn-secondary" style="border-color:var(--neon-purple);color:var(--neon-purple);box-shadow:0 0 10px rgba(155,0,255,0.2);" onclick="loadAll()">Pripoj</button>
  </div>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;">
    <div class="search-box">
      <input type="text" id="search" placeholder="Hľadaj meno, prezývku...">
    </div>
    <button class="btn btn-primary" onclick="filterStudents()">Hľadaj</button>
    <button class="btn btn-secondary" onclick="loadAll()">Všetci</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="grid" id="grid">
  <div class="state">
    <div class="spinner"></div>
    NAČÍTAVAM ŽIAKOV...
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-img-wrap">
      <button class="modal-close" onclick="closeModal()">×</button>
      <img id="modalImg" src="" alt="">
    </div>
    <div class="modal-body">
      <div class="modal-id" id="modalId"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-nick" id="modalNick"></div>
      <div class="modal-section-label">Fun Fact</div>
      <div class="modal-funfact" id="modalFunfact"></div>
    </div>
  </div>
</div>

<script>
  function getAPI() {
    return (document.getElementById('apiUrl').value || 'https://rekumartin.github.io/moj_prvy_backend/api.json').replace(/\/$/, '');
  }
  let allStudents = [];

  async function loadAll() {
    showLoading();
    document.getElementById('search').value = '';
    try {
      const res = await fetch(`${getAPI()}/ziaci`);
      if (!res.ok) throw new Error('API error');
      allStudents = await res.json();
      renderStudents(allStudents);
    } catch (e) {
      showError();
    }
  }

  function filterStudents() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    if (!q) { renderStudents(allStudents); return; }
    const filtered = allStudents.filter(s =>
      (s.meno || '').toLowerCase().includes(q) ||
      (s.prezyvka || '').toLowerCase().includes(q) ||
      String(s.id || '').includes(q)
    );
    renderStudents(filtered);
  }

  function renderStudents(students) {
    const grid = document.getElementById('grid');
    const stats = document.getElementById('statsBar');

    stats.innerHTML = `CELKOM <span>${students.length}</span> ŽIAKOV`;

    if (!students.length) {
      grid.innerHTML = `
        <div class="state" style="grid-column:1/-1">
          <div class="icon">🔍</div>
          ŽIADNY ŽIAK NENÁJDENÝ
        </div>`;
      return;
    }

    grid.innerHTML = '';
    students.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${s.fotka || `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${s.id}`}" 
               alt="${s.meno}" 
               onerror="this.src='https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${s.id}'">
          <div class="card-id">#${s.id}</div>
        </div>
        <div class="card-body">
          <div class="card-name">${s.meno || '—'}</div>
          <div class="card-nick">${s.prezyvka || '—'}</div>
          <div class="card-funfact">${s.funfact || 'Žiadny fun fact...'}</div>
        </div>`;
      card.onclick = () => openModal(s);
      grid.appendChild(card);
    });
  }

  function openModal(s) {
    document.getElementById('modalImg').src =
      s.fotka || `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${s.id}`;
    document.getElementById('modalId').textContent = `ID #${s.id}`;
    document.getElementById('modalName').textContent = s.meno || '—';
    document.getElementById('modalNick').textContent = s.prezyvka || '—';
    document.getElementById('modalFunfact').textContent = s.funfact || 'Žiadny fun fact.';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('search').addEventListener('keypress', e => {
    if (e.key === 'Enter') filterStudents();
  });

  function showLoading() {
    document.getElementById('grid').innerHTML = `
      <div class="state" style="grid-column:1/-1">
        <div class="spinner"></div>
        NAČÍTAVAM ŽIAKOV...
      </div>`;
    document.getElementById('statsBar').innerHTML = '';
  }

  function showError() {
    document.getElementById('grid').innerHTML = `
      <div class="state" style="grid-column:1/-1">
        <div class="icon">⚡</div>
        CHYBA PRIPOJENIA K API<br>
        <small style="font-size:10px;opacity:0.5;margin-top:8px;display:block">
          Skontroluj adresu API: ${getAPI()}/ziaci
        </small>
      </div>`;
  }

  // Skús načítať pri štarte
  loadAll();
</script>
</body>
</html>
