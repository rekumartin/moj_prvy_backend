<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Student Lounge</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;text-align:center;">

<h1>STUDENT LOUNGE</h1>

<input id="apiUrl" style="width:300px;"
value="https://rekumartin.github.io/moj_prvy_backend/api.json">

<br><br>

<input id="search" placeholder="Hľadaj...">
<button onclick="filterStudents()">Hľadaj</button>
<button onclick="loadAll()">Reload</button>

<div id="grid" style="margin-top:20px;"></div>

<script>
let allStudents = [];

function getAPI() {
  return document.getElementById('apiUrl').value;
}

async function loadAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = "Načítavam...";

  try {
    const res = await fetch(getAPI());
    const data = await res.json();

    // 🔥 FIX – podpora oboch formátov
    if (Array.isArray(data)) {
      allStudents = data;
    } else if (data.ziaci) {
      allStudents = data.ziaci;
    } else {
      throw new Error("Zlý JSON formát");
    }

    renderStudents(allStudents);

  } catch (err) {
    console.error(err);
    grid.innerHTML = "❌ CHYBA – otvor F12 → Console";
  }
}

function filterStudents() {
  const q = document.getElementById('search').value.toLowerCase();

  const filtered = allStudents.filter(s =>
    (s.meno || '').toLowerCase().includes(q) ||
    (s.prezyvka || '').toLowerCase().includes(q)
  );

  renderStudents(filtered);
}

function renderStudents(data) {
  const grid = document.getElementById('grid');

  if (!data.length) {
    grid.innerHTML = "Nič nenájdené";
    return;
  }

  grid.innerHTML = data.map(s => `
    <div style="border:1px solid #555;margin:10px;padding:10px;">
      <b>${s.meno || '-'}</b><br>
      @${s.prezyvka || '-'}<br>
      ${s.funfact || ''}
    </div>
  `).join('');
}

// auto load
loadAll();
</script>

</body>
</html>
