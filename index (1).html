<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Neon Student Lounge</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Rajdhani',sans-serif;
  background:#08060f;
  color:white;
}

h1{
  text-align:center;
  margin:30px;
  font-family:'Orbitron';
}

.controls{
  text-align:center;
  margin-bottom:20px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#9b00ff;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px #00ffff;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal.open{
  display:flex;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:15px;
  max-width:400px;
}

</style>
</head>

<body>

<h1>STUDENT LOUNGE</h1>

<div class="controls">
  <input id="apiUrl" style="width:350px;"
  value="https://rekumartin.github.io/moj_prvy_backend/api.json">
  <br>
  <input id="search" placeholder="Hľadaj meno alebo prezývku">
  <button onclick="filterStudents()">Hľadaj</button>
  <button onclick="loadAll()">Reload</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <img id="mImg" style="width:100%;margin-bottom:10px;">
    <h2 id="mName"></h2>
    <p id="mNick"></p>
    <p id="mBio"></p>
  </div>
</div>

<script>
let allStudents = [];

function getAPI(){
  return document.getElementById('apiUrl').value;
}

async function loadAll(){
  const grid = document.getElementById('grid');
  grid.innerHTML = "Načítavam...";

  try{
    const res = await fetch(getAPI());
    const data = await res.json();

    allStudents = data.students;

    renderStudents(allStudents);
  }catch(e){
    console.error(e);
    grid.innerHTML = "❌ Chyba načítania";
  }
}

function filterStudents(){
  const q = document.getElementById('search').value.toLowerCase();

  const filtered = allStudents.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.nickname.toLowerCase().includes(q)
  );

  renderStudents(filtered);
}

function renderStudents(data){
  const grid = document.getElementById('grid');

  if(!data.length){
    grid.innerHTML = "Nič nenájdené";
    return;
  }

  grid.innerHTML = data.map(s => `
    <div class="card" onclick="openModal(${s.id})">
      <img src="${s.image}">
      <div class="card-body">
        <b>${s.name} ${s.surname}</b><br>
        @${s.nickname}
      </div>
    </div>
  `).join('');
}

function openModal(id){
  const s = allStudents.find(x => x.id === id);

  document.getElementById('mImg').src = s.image;
  document.getElementById('mName').innerText = s.name + " " + s.surname;
  document.getElementById('mNick').innerText = "@" + s.nickname;
  document.getElementById('mBio').innerText = s.bio;

  document.getElementById('modal').classList.add('open');
}

function closeModal(e){
  if(!e || e.target.id === "modal"){
    document.getElementById('modal').classList.remove('open');
  }
}

loadAll();
</script>

</body>
</html>
